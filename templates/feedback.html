{% extends 'base.html' %}

{% block title %}
Feedback
{% endblock %}

{% block content %}

<section class="feedback-section">

    <h2>Submit Feedback</h2>

    <form action="{{ url_for('feedback') }}" method="POST">

        <!-- Meal Selection -->
        <label for="meal">Meal</label>
        <select
            id="meal"
            name="meal"
            title="Select the meal"
            required>

            <option value="" disabled selected>Select Meal</option>
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>

        </select>

        <br><br>

        <!-- Rating -->
        <label for="rating">Rating (1-5)</label>
        <input
            type="number"
            id="rating"
            name="rating"
            min="1"
            max="5"
            placeholder="Enter rating between 1 and 5"
            title="Rate the meal from 1 to 5"
            required>

        <br><br>

        <!-- Comment -->
        <label for="comment">Comment</label>
        <textarea
            id="comment"
            name="comment"
            rows="5"
            placeholder="Write your feedback here..."
            title="Enter your feedback"
            required></textarea>

        <br><br>

        <!-- Submit Button -->
        <button type="submit">
            Submit Feedback
        </button>

    </form>

</section>

{% endblock %}
